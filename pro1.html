<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
      .box {
        background-color: orange;
        width: 24vw;
        height: 400px;
        border: 2px solid black;
        display: inline-block;        
      }
      @media (max-width: 992px) {
        .box {
          background-color: rgb(10, 227, 28);
          width: 32vw;
          height: 400px;
        }
      }
      @media (max-width: 768px) {
        .box {
          background-color: rgb(41, 17, 226);
          width: 48vw;
          height: 400px;
        }
      }
      @media (max-width: 576px) {
        .box {
          background-color: rgb(255, 64, 0);
          width: 100vw;
          height: 400px;
        }
      }
      .content{
        /* display: flex; */        
      }
    </style>
  </head>
  <body>
    <div class="content">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
